name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup Build Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG  version=$VERSION"

  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          chmod +x ./scripts/release-notes.sh
          ./scripts/release-notes.sh "${{ needs.setup.outputs.tag }}"

      - uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.setup.outputs.tag }}
          name: "${{ needs.setup.outputs.tag }}"
          bodyFile: release_notes.md
          generateReleaseNotes: false

  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS installer (VST3 + AU, universal)
    runs-on: macos-14
    needs: [setup, create-release]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE source
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-macos-${{ hashFiles('CMakeLists.txt') }}

      - name: Import Developer ID certificate
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_P12 }}" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Configure (universal binary, Developer ID signing)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCODE_SIGN_IDENTITY="Developer ID Application: Neal Sanche (KN424RZG26)" \
            -DDEVELOPMENT_TEAM=KN424RZG26

      - name: Build
        run: cmake --build build --parallel

      - name: Notarize plugins
        run: |
          ditto -c -k --keepParent \
            "build/NTPerform_artefacts/Release/VST3/NTPerform.vst3" \
            /tmp/vst3.zip
          ditto -c -k --keepParent \
            "build/NTPerform_artefacts/Release/AU/NTPerform.component" \
            /tmp/au.zip
          xcrun notarytool submit /tmp/vst3.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id KN424RZG26 --wait
          xcrun notarytool submit /tmp/au.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id KN424RZG26 --wait
          xcrun stapler staple "build/NTPerform_artefacts/Release/VST3/NTPerform.vst3"
          xcrun stapler staple "build/NTPerform_artefacts/Release/AU/NTPerform.component"

      - name: Build .pkg installer
        run: |
          VST3="build/NTPerform_artefacts/Release/VST3/NTPerform.vst3"
          AU="build/NTPerform_artefacts/Release/AU/NTPerform.component"

          mkdir -p /tmp/pkg-vst3 /tmp/pkg-au

          cp -R "$VST3" /tmp/pkg-vst3/
          cp -R "$AU"   /tmp/pkg-au/

          pkgbuild \
            --root /tmp/pkg-vst3 \
            --install-location "/Library/Audio/Plug-Ins/VST3" \
            --identifier "dev.nosuch.ntperform.vst3" \
            --version "${VERSION}" \
            /tmp/NTPerform_VST3.pkg

          pkgbuild \
            --root /tmp/pkg-au \
            --install-location "/Library/Audio/Plug-Ins/Components" \
            --identifier "dev.nosuch.ntperform.au" \
            --version "${VERSION}" \
            /tmp/NTPerform_AU.pkg

          cat > /tmp/distribution.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <title>NT Perform</title>
              <options customize="never" require-scripts="false" rootVolumeOnly="true"/>
              <choices-outline>
                  <line choice="vst3"/>
                  <line choice="au"/>
              </choices-outline>
              <choice id="vst3" title="VST3 Plugin"
                  description="Installs NT Perform VST3 to /Library/Audio/Plug-Ins/VST3/">
                  <pkg-ref id="dev.nosuch.ntperform.vst3"/>
              </choice>
              <choice id="au" title="Audio Unit Plugin"
                  description="Installs NT Perform AU to /Library/Audio/Plug-Ins/Components/">
                  <pkg-ref id="dev.nosuch.ntperform.au"/>
              </choice>
              <pkg-ref id="dev.nosuch.ntperform.vst3">NTPerform_VST3.pkg</pkg-ref>
              <pkg-ref id="dev.nosuch.ntperform.au">NTPerform_AU.pkg</pkg-ref>
          </installer-gui-script>
          XMLEOF

          productbuild \
            --distribution /tmp/distribution.xml \
            --package-path /tmp \
            "/tmp/NTPerform-${VERSION}-macOS.pkg"

      - name: Notarize .pkg installer
        run: |
          xcrun notarytool submit "/tmp/NTPerform-${VERSION}-macOS.pkg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id KN424RZG26 --wait
          xcrun stapler staple "/tmp/NTPerform-${VERSION}-macOS.pkg"

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.setup.outputs.tag }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: "/tmp/NTPerform-${{ env.VERSION }}-macOS.pkg"

      - name: Delete build keychain
        if: always()
        run: security delete-keychain build.keychain || true

  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows installer (VST3)
    runs-on: windows-latest
    needs: [setup, create-release]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE source
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-windows-${{ hashFiles('CMakeLists.txt') }}

      - name: Install NSIS
        run: choco install nsis -y

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $vst3 = "build\NTPerform_artefacts\Release\VST3\NTPerform.vst3"
          $nsiScript = "scripts\windows-installer.nsi"

          # Stage VST3 next to the NSI script's working dir
          Copy-Item -Recurse $vst3 .

          # Build installer (output file defined in the NSI script)
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            /DPRODUCT_VERSION=$env:VERSION `
            $nsiScript

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.setup.outputs.tag }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: "NTPerform-${{ env.VERSION }}-Windows.exe"

  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (VST3)
    runs-on: ubuntu-latest
    needs: [setup, create-release]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE source
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-linux-${{ hashFiles('CMakeLists.txt') }}

      - name: Install JUCE dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libasound2-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libfreetype6-dev libfontconfig1-dev \
            mesa-common-dev libglu1-mesa-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package tar.gz
        run: |
          mkdir -p "NTPerform-${VERSION}-Linux"
          cp -R "build/NTPerform_artefacts/Release/VST3/NTPerform.vst3" \
               "NTPerform-${VERSION}-Linux/"
          tar -czf "NTPerform-${VERSION}-Linux.tar.gz" "NTPerform-${VERSION}-Linux"

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.setup.outputs.tag }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: "NTPerform-${{ env.VERSION }}-Linux.tar.gz"
